<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>組 -KUMI-</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0e0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="組">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&display=swap');

:root {
  --washi: #0f0e16;
  --washi2: #161422;
  --sumi: #1a1510;
  --sumi2: #2d2620;
  --border: rgba(180,160,255,0.12);
  --aka: #e8002a;
  --seiji: #2ab8d4;
  --yamabuki: #c8e832;
  --kin: #c8e832;
  --muted: #6a6a8a;
  --text: #c8c0e0;
  --overlay-bg: rgba(10,6,20,0.55);
  --msg-bg: rgba(10,6,20,0.82);
  --msg-border: rgba(180,150,255,0.3);
  --affection-color: #e87ca0;
  --char-a-accent: #7b9fff;
  --char-b-accent: #ff8c6b;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  background: #0e0a14;
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  height: 100dvh;
  display: flex; flex-direction: column; overflow: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ════════════ アニメーション：霊のふわふわ ════════════ */
@keyframes spirit-alive {
  0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
  33% { transform: translateY(-8px) rotate(2deg) scale(1.03); }
  66% { transform: translateY(-4px) rotate(-2deg) scale(0.97); }
}

/* ════════════ スタイル ════════════ */
#char-select {
  position: fixed; inset: 0; z-index: 350;
  display: none;
  background: linear-gradient(160deg, #0e0a14 0%, #1a1030 100%);
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px; padding: 40px 24px;
  text-align: center;
}
.cs-title { font-family: 'Shippori Mincho', serif; font-size: 13px; letter-spacing: 6px; color: rgba(255,255,255,0.4); }
.cs-subtitle { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700; letter-spacing: 4px; color: #fff; text-shadow: 0 0 30px rgba(180,150,255,0.4); }
.char-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 360px; overflow-y: auto; max-height: 52vh; }
.char-cards::-webkit-scrollbar { display: none; }
.char-card { flex: 1; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform .2s, box-shadow .2s; background: rgba(255,255,255,0.04); }
.char-card:active { transform: scale(.96); }
.char-card.a { box-shadow: 0 0 0 0 var(--char-a-accent); }
.char-card.b { box-shadow: 0 0 0 0 var(--char-b-accent); }
.char-card:hover.a { box-shadow: 0 0 20px rgba(123,159,255,0.3); border-color: rgba(123,159,255,0.4); }
.char-card:hover.b { box-shadow: 0 0 20px rgba(255,140,107,0.3); border-color: rgba(255,140,107,0.4); }

.char-portrait-placeholder { width: 100%; aspect-ratio: 2/3; display: flex; align-items: flex-start; justify-content: center; font-size: 64px; position: relative; overflow: hidden; }
.char-card.a .char-portrait-placeholder { background: linear-gradient(170deg, #141830 0%, #1e2545 100%); }
.char-card.b .char-portrait-placeholder { background: linear-gradient(170deg, #1e1008 0%, #2d1a10 100%); }
.char-portrait-placeholder::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.4), transparent); }
.char-info { padding: 10px 12px 14px; background: rgba(0,0,0,0.3); }
.char-name { font-family: 'Shippori Mincho', serif; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 2px; }
.char-name-sub { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.char-aff { font-size: 11px; font-weight: 700; margin-top: 4px; letter-spacing: 1px; font-family: 'Shippori Mincho', serif; }
.char-card.a .char-name { color: #a8bfff; }
.char-card.b .char-name { color: #ffb09a; }

#game-ui { display:none; flex:1; flex-direction:column; min-height:0; overflow:hidden; }
#game-ui.show { display:flex; }
#char-area { flex: 1 1 0; position: relative; overflow: hidden; background: transparent; min-height: 0; }
#char-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; transition: filter .4s; }
#char-img .char-bust { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; transition: none; }
#char-img .char-bust img { width: 100%; height: auto; mix-blend-mode: lighten; display: block; }
#char-img.react-good .char-bust { animation: charHappy 0.5s ease; }
#char-img.react-bad  .char-bust { animation: charSad 0.5s ease; }

@keyframes charHappy { 0% { transform: translateX(-50%) translateY(0); } 30% { transform: translateX(-50%) translateY(-12px); } 60% { transform: translateX(-50%) translateY(-6px); } 100% { transform: translateX(-50%) translateY(0); } }
@keyframes charSad { 0% { transform: translateX(-50%); filter: brightness(1); } 10% { transform: translateX(calc(-50% - 5px)); filter: brightness(2.5); } 20% { transform: translateX(calc(-50% + 5px)); filter: brightness(1); } 100% { transform: translateX(-50%); filter: brightness(1); } }

#char-area::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 80%, var(--char-glow, rgba(123,159,255,0.12)) 0%, transparent 70%); pointer-events: none; }
#hud { position: relative; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; z-index: 50; background: rgba(0,0,0,0.85); flex-shrink: 0; }
.hud-pill { background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 5px; font-family: 'Noto Serif JP', serif; backdrop-filter: blur(4px); }
#hud-lives { font-size: 13px; letter-spacing: 1px; background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 2px 8px; backdrop-filter: blur(4px); }
.hud-pill .lbl { font-size: 8px; color: rgba(255,255,255,0.4); }
#btn-mute { background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 9px; font-size: 13px; cursor: pointer; backdrop-filter: blur(4px); }

#affection-bar-wrap { position: absolute; bottom: 56px; left: 16px; right: 16px; z-index: 10; }
.aff-top-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; position: relative; }
.aff-label { font-size: 9px; letter-spacing: 2px; color: rgba(255,255,255,0.4); font-family: 'Shippori Mincho', serif; flex-shrink: 0; }
#aff-hearts { font-size: 14px; color: var(--affection-color); transition: transform .2s; flex-shrink: 0; }
#aff-num { font-family: 'Shippori Mincho', serif; font-size: 13px; font-weight: 700; color: var(--affection-color); min-width: 28px; }
#aff-hearts.pulse { animation: heartPulse .35s ease; }
@keyframes heartPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.25); } }

.aff-track { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: visible; position: relative; }
#aff-bar { height: 100%; width: 50%; border-radius: 3px; background: linear-gradient(90deg, var(--affection-color), #ffb3cc); transition: width .5s cubic-bezier(.4,0,.2,1); position: relative; }
#aff-bar::after { content: ''; position: absolute; right: -1px; top: -2px; width: 9px; height: 9px; border-radius: 50%; background: #ffb3cc; box-shadow: 0 0 6px rgba(255,179,204,0.8); }

#msg-window { position: absolute; bottom: 0; left: 0; right: 0; background: var(--msg-bg); border-top: 1px solid var(--msg-border); padding: 6px 16px 8px; height: 52px; z-index: 30; backdrop-filter: blur(8px); transition: opacity .4s; overflow: hidden; }
#msg-window.hide { opacity: 0; pointer-events: none; }
.msg-name { font-family: 'Shippori Mincho', serif; font-size: 10px; letter-spacing: 3px; margin-bottom: 2px; }
#msg-text { font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.7; letter-spacing: .5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#game-area { flex: 1 1 0; min-height: 0; background: #000000; display: flex; flex-direction: column; position: relative; }
#board-wrap { flex:1 1 0; min-height:0; padding:5px 6px; display:flex; position:relative; z-index:1; }
#board { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 0px; flex:1; min-height:0; }

.card { background: transparent; border: none; border-right: 1px solid rgba(180,160,255,0.08); border-bottom: 1px solid rgba(180,160,255,0.08); border-radius: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: visible; transition: transform .12s, background .15s; min-height:0; min-width:0; position: relative; }
.card:nth-child(3n+1) { border-left: none; }
.card:nth-child(-n+3) { border-top: none; }
.card:active { transform: scale(.93); }
.card.selected { border-color: rgba(200,180,255,0.4) !important; border-width: 1px !important; animation: selectedPulse 1.4s ease-in-out infinite !important; border-radius: 4px; }
@keyframes selectedPulse { 0% { background: rgba(120,100,180,0.35); } 30% { background: rgba(60,50,100,0.55); } 100% { background: rgba(18,14,30,0.25); } }

/* ══════════ アイコンのアニメーション ══════════ */
.card svg {
  width: 82%; height: 88%; display: block;
  animation: spirit-alive 4s ease-in-out infinite;
  transform-origin: center;
}

.card.hint-glow { animation: hintPulse 1.2s ease-in-out infinite !important; border-color: rgba(255,255,255,0.6) !important; border-radius: 4px; }
@keyframes hintPulse { 0%,100% { box-shadow: 0 0 0 2px rgba(255,255,255,0), 0 0 0px rgba(255,255,255,0); } 50% { box-shadow: 0 0 0 3px rgba(255,255,255,0.9), 0 0 18px rgba(255,255,255,0.4); } }
</style>
</head>
<body>

<div id="title-screen">
  <div class="title-content">
    <div class="title-kanji">組</div>
    <div class="title-tap-hint">タップして始める</div>
  </div>
</div>

<div id="char-select" style="display:none">
  <div class="cs-title">― 組 KUMI ―</div>
  <div id="char-cards-wrap"></div>
</div>

<div id="game-ui">
  <div id="char-area">
    <div id="hud">
      <div class="hud-pill"><span class="lbl">組</span><span id="score">0</span></div>
      <button id="btn-mute">🔔</button>
    </div>
    <div id="char-img"><div class="char-bust" id="char-bust">🧑‍🦯</div></div>
    <div id="affection-bar-wrap">
        <div class="aff-top-row"><div class="aff-label">好感度</div><div id="aff-hearts">♡</div><div id="aff-num">20</div></div>
        <div class="aff-track"><div id="aff-bar"></div></div>
    </div>
    <div id="msg-window"><div class="msg-name" id="msg-name">如月 蒼</div><div id="msg-text">…</div></div>
  </div>
  <div id="game-area"><div id="board-wrap"><div id="board"></div></div></div>
</div>

<script>
// (中略：既存のロジックはそのまま維持)
// 重要: render関数を以下のように修正してください

function render(){
  const bd=document.getElementById('board');bd.innerHTML='';
  board.forEach((card,i)=>{
    const div=document.createElement('div');div.className='card';
    const svg=makeShape(card);
    // ランダムなアニメーション遅延を付与
    svg.style.animationDelay = (Math.random() * -4).toFixed(1) + 's';
    div.appendChild(svg);
    div.addEventListener('click',()=>pick(i));
    bd.appendChild(div);
  });
  if(findSets(board).length===0) ensure();
}

// 既存の関数群はここにそのまま貼り付け
// selectChar, submit, pick, ensure, makeShape などのロジック...

</script>
</body>
</html>
