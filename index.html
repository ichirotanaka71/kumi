<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>組 -KUMI-</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0e0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="組">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&display=swap');

/* ▼▼▼ 追加したアニメーション設定 ▼▼▼ */
@keyframes spirit-alive {
  0%, 100% { transform: translateY(0px) rotate(0deg) scale(1); }
  33% { transform: translateY(-8px) rotate(2deg) scale(1.03); }
  66% { transform: translateY(-4px) rotate(-2deg) scale(0.97); }
}
/* ▲▲▲ 演出設定終わり ▲▲▲ */

:root {
  --washi: #0f0e16; --washi2: #161422; --sumi: #1a1510; --sumi2: #2d2620;
  --border: rgba(180,160,255,0.12); --aka: #e8002a; --seiji: #2ab8d4;
  --yamabuki: #c8e832; --kin: #c8e832; --muted: #6a6a8a; --text: #c8c0e0;
  --overlay-bg: rgba(10,6,20,0.55); --msg-bg: rgba(10,6,20,0.82);
  --msg-border: rgba(180,150,255,0.3); --affection-color: #e87ca0;
  --char-a-accent: #7b9fff; --char-b-accent: #ff8c6b;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body { background: #0e0a14; color: var(--text); font-family: 'Noto Serif JP', serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

/* (中略：既存スタイル) */
#char-select { position: fixed; inset: 0; z-index: 350; display: none; background: linear-gradient(160deg, #0e0a14 0%, #1a1030 100%); flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 40px 24px; text-align: center; }
.cs-title { font-family: 'Shippori Mincho', serif; font-size: 13px; letter-spacing: 6px; color: rgba(255,255,255,0.4); }
.cs-subtitle { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700; letter-spacing: 4px; color: #fff; text-shadow: 0 0 30px rgba(180,150,255,0.4); }
.char-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 360px; overflow-y: auto; max-height: 52vh; }
.char-card { flex: 1; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform .2s, box-shadow .2s; background: rgba(255,255,255,0.04); }
#game-ui { display:none; flex:1; flex-direction:column; min-height:0; overflow:hidden; }
#game-ui.show { display:flex; }
#char-area { flex: 1 1 0; position: relative; overflow: hidden; background: transparent; min-height: 0; }
#char-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; transition: filter .4s; }
#char-img .char-bust { position: absolute; left: 50%; transform: translateX(-50%); width: 100%; }
#char-img .char-bust img { width: 100%; height: auto; mix-blend-mode: lighten; display: block; }
#hud { position: relative; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; z-index: 50; background: rgba(0,0,0,0.85); flex-shrink: 0; }
.hud-pill { background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 5px; font-family: 'Noto Serif JP', serif; backdrop-filter: blur(4px); }
#msg-window { position: absolute; bottom: 0; left: 0; right: 0; background: var(--msg-bg); border-top: 1px solid var(--msg-border); padding: 6px 16px 8px; height: 52px; z-index: 30; backdrop-filter: blur(8px); }
#game-area { flex: 1 1 0; min-height: 0; background: #000000; display: flex; flex-direction: column; position: relative; }
#board-wrap { flex:1 1 0; min-height:0; padding:5px 6px; display:flex; position:relative; z-index:1; }
#board { display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr); gap: 0px; flex:1; min-height:0; }
.card { background: transparent; border: none; border-right: 1px solid rgba(180,160,255,0.08); border-bottom: 1px solid rgba(180,160,255,0.08); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: visible; position: relative; }
.card:nth-child(3n+1) { border-left: none; }
.card:nth-child(-n+3) { border-top: none; }

/* ▼▼▼ ここを更新：ふわふわアニメーション適用 ▼▼▼ */
.card svg {
  width:82%; height:88%; display:block;
  animation: spirit-alive 4s ease-in-out infinite;
  animation-delay: var(--float-delay, 0s);
  transform-origin: center;
}
/* ▲▲▲ ここまで更新 ▲▲▲ */

#title-screen { position: fixed; inset: 0; z-index: 400; background: linear-gradient(160deg, #050310 0%, #0e0a1e 50%, #060210 100%); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; }
.title-content { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 1; }
.title-kanji { font-family: 'Shippori Mincho', serif; font-size: 88px; font-weight: 700; color: #fff; text-shadow: 0 0 60px rgba(180,150,255,0.5); }
.title-tap-hint { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
<script>
// 【重要】render関数を修正版に差し替えています
function render(){
  const bd=document.getElementById('board');
  bd.innerHTML='';
  board.forEach((card,i)=>{
    const div=document.createElement('div');
    div.className='card';
    const svg=makeShape(card);
    
    // 【更新】各カードのSVGにランダムな遅延を適用
    svg.style.setProperty('--float-delay', (-Math.random() * 4).toFixed(1) + 's');
    
    div.appendChild(svg);
    div.addEventListener('click',()=>pick(i));
    bd.appendChild(div);
  });
  if(findSets(board).length===0) ensure();
}

// （以下、バックアップファイルの script タグ内のすべての関数をそのまま残してください）
</script>
</body>
</html>
